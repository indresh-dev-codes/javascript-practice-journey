<!DOCTYPE html>
<html lang="en">
<head>
    <title>Myntra Dealer Login</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-96">

        <h1 class="text-2xl font-bold text-center mb-6">
            Dealer Login
        </h1>

        <!-- Email -->
        <input 
            type="email"
            id="email"
            placeholder="Enter email"
            class="w-full border p-2 mb-4 rounded"
        >

        <!-- Password -->
        <input 
            type="password"
            id="password"
            placeholder="Enter password"
            class="w-full border p-2 mb-4 rounded"
        >

        <!-- Show password -->
        <button 
            id="showPassword"
            class="bg-gray-300 px-4 py-2 rounded mb-4"
        >
            Show Password
        </button>

        <!-- Login button -->
        <button 
            id="loginBtn"
            class="w-full bg-pink-500 text-white p-2 rounded"
        >
            Login
        </button>
                <!-- Forgot Password -->
        <button
            id="forgotBtn"
            class="text-blue-500 mt-4 w-full"
        >
            Forgot Password?
        </button>

        <p id="message" class="text-red-500 mt-4 text-center"></p>

    </div>

    <script src="./js/login.js"></script>
</body>
</html>
