<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <div class="p-8">

        <h1 class="text-3xl font-bold">
            Welcome Dealer
        </h1>

        <p class="mt-4 text-lg" id="dealerInfo"></p>

        <button 
            onclick="logout()"
            class="bg-red-500 text-white px-4 py-2 mt-5 rounded"
        >
            Logout
        </button>

    </div>

<script>
    let email = localStorage.getItem("dealerEmail");

    document.getElementById("dealerInfo").innerText =
        "Logged in as: " + email;

    function logout(){
        localStorage.removeItem("dealerEmail");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
